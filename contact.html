<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>studio333 — Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <a href="gallery.html" class="brand">studio333</a>
        <nav>
          <a href="gallery.html">Gallery</a>
          <a href="featured.html">Featured</a>
          <a href="contact.html" class="active">Contact</a>
          <a href="qr.html">Share</a>
        </nav>
      </header>
      <main>
        <section class="contact-section">
          <div class="contact-intro">
            <p class="tagline">Contact</p>
            <h1>Private inquiries</h1>
            <hr style="border: none; border-top: 1px solid #e0dbd5; margin: 0 0 20px;" />
            <p class="contact-subtext">For acquisition inquiries, commissions, or general correspondence.</p>

            <!--
              ============================================================
              CONTACT FORM — sends to Dana@studio333gallery.com
              ============================================================
              This form uses Formspree (https://formspree.io) to deliver
              submissions by email. No server code is required, which is
              why it keeps working no matter where the site is hosted.

              ONE-TIME SETUP (must be done once, by anyone):
                1. Go to https://formspree.io and create a free account
                   using Dana@studio333gallery.com.
                2. Create a new form (name it e.g. "studio333 inquiries").
                3. Formspree gives you a form endpoint that looks like:
                     https://formspree.io/f/abcdwxyz
                4. Replace the word YOUR_FORM_ID below with that ID
                   (the part after /f/ — e.g. abcdwxyz).
                5. Submit the form once and confirm the verification email
                   Formspree sends to Dana's inbox. Done.

              Until step 4 is completed, the form will not deliver mail.
              ============================================================
            -->
            <form
              class="contact-form"
              style="margin-top: 32px;"
              action="https://formspree.io/f/mbdbvnzg"
              method="POST"
            >
              <div class="contact-field">
                <label class="contact-label" for="name">Name</label>
                <input type="text" id="name" name="name" />
              </div>
              <div class="contact-field">
                <label class="contact-label" for="email">Email</label>
                <input type="email" id="email" name="email" required />
              </div>
              <div class="contact-field">
                <label class="contact-label" for="message">Message</label>
                <textarea id="message" name="message"></textarea>
              </div>

              <!-- Sets the email subject line Dana sees -->
              <input type="hidden" name="_subject" value="New studio333 inquiry" />
              <!-- Simple spam honeypot: bots fill this, humans never see it -->
              <input type="text" name="_gotcha" style="display:none" />

              <button type="submit" class="contact-submit ghost-link">Send inquiry →</button>
            </form>
          </div>
        </section>
      </main>
      <footer class="footer-nav">
        <hr style="border: none; border-top: 1px solid #c8c2ba; margin: 0 0 24px; width: 100%;" />
        <span class="copyright">© 2026 studio333. All rights reserved.</span>
      </footer>
    </div>
  </body>
</html>
