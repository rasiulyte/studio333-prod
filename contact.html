<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>studio333 — Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a href="gallery.html" class="brand">studio333</a>
      <nav>
        <a href="gallery.html">Gallery</a>
        <a href="featured.html">Featured</a>
        <a href="contact.html" class="active">Contact</a>
        <a href="qr.html">Share</a>
      </nav>
    </header>

    <main>
      <section class="contact-section">
        <div class="contact-intro">
          <p class="tagline">Contact</p>
          <h1>Private inquiries</h1>
          <hr style="border: none; border-top: 1px solid #e0dbd5; margin: 0 0 20px;" />
          <p class="contact-subtext">For acquisition inquiries, commissions, or general correspondence.</p>
          <form class="contact-form" style="margin-top: 32px;">
            <div class="contact-field">
              <label class="contact-label" for="name">Name</label>
              <input type="text" id="name" name="name" />
            </div>
            <div class="contact-field">
              <label class="contact-label" for="email">Email</label>
              <input type="email" id="email" name="email" required />
            </div>
            <div class="contact-field">
              <label class="contact-label" for="message">Message</label>
              <textarea id="message" name="message"></textarea>
            </div>
            <button type="submit" class="contact-submit ghost-link">Send inquiry →</button>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer-nav">
      <hr style="border: none; border-top: 1px solid #c8c2ba; margin: 0 0 24px; width: 100%;" />
      <span class="copyright">© 2026 studio333. All rights reserved.</span>
    </footer>
  </div>
</body>
</html>
